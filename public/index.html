<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zerodha Journal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e2e8f0; font-family: Inter, sans-serif; }
    nav { background: #161b22; border-bottom: 1px solid #21262d; padding: 0 24px; display: flex; align-items: center; gap: 0; }
    .logo { background: linear-gradient(135deg,#f97316,#ef4444); border-radius: 6px; padding: 4px 12px; font-weight: 800; font-size: 14px; margin-right: 24px; color: #fff; text-decoration: none; }
    nav a { padding: 14px 18px; font-size: 13px; font-weight: 600; color: #8b949e; text-decoration: none; border-bottom: 2px solid transparent; display: inline-block; }
    nav a:hover { color: #e2e8f0; }
    nav a.active { color: #f97316; border-bottom-color: #f97316; }
    .content { padding: 32px 24px; max-width: 900px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { color: #8b949e; margin-top: 8px; }
    .status { color: #4ade80; font-weight: 600; margin-top: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="/">Z</a>
    <a href="/" class="active">Dashboard</a>
    <a href="/add-trade.html">Add Trade</a>
    <a href="#">Trade Log</a>
    <a href="#">Daily Summary</a>
    <a href="#">Equity Curve</a>
  </nav>
  <div class="content">
    <h1>Zerodha Options Journal</h1>
    <p>Your local trading journal — all data saved on your machine.</p>
    <div class="status">✅ Server is running &nbsp;|&nbsp; Phase 2 — Add Trade</div>
  </div>
</body>
</html>
