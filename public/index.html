<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zerodha Journal</title>
  <style>
    body { background: #0d1117; color: #e2e8f0; font-family: Inter, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { text-align: center; }
    .logo { background: linear-gradient(135deg, #f97316, #ef4444); padding: 10px 18px; border-radius: 8px; font-weight: 800; font-size: 20px; display: inline-block; margin-bottom: 20px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #8b949e; }
    .status { color: #4ade80; font-weight: 600; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">Z</div>
    <h1>Zerodha Options Journal</h1>
    <p>Your local trading journal</p>
    <div class="status">✅ Server is running</div>
  </div>
</body>
</html>
